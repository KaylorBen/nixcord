name: Update Discord

on:
  schedule:
    - cron: "0 */8 * * *" # Every 8 hours
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-discord:
    name: Update Discord
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v20

      - name: Get old versions
        id: old-versions
        run: |
          set -euo pipefail
          echo "::group::Extracting current versions using nix eval"
          PACKAGES=("discord" "discord-ptb" "discord-canary" "discord-development")

          # Linux Versions
          for pkg in "${PACKAGES[@]}"; do
            version=$(nix eval --raw --impure ".#${pkg}.version")
            echo "linux_${pkg}=${version}" >> "$GITHUB_OUTPUT"
            echo "Extracted Linux: ${pkg}=${version}"
          done

          # Darwin Versions
          for pkg in "${PACKAGES[@]}"; do
            version=$(nix eval --raw --system "aarch64-darwin" --impure ".#${pkg}.version")
            echo "darwin_${pkg}=${version}" >> "$GITHUB_OUTPUT"
            echo "Extracted Darwin: ${pkg}=${version}"
          done
          echo "::endgroup::"

      - name: Update Discord sources for all variants
        id: update
        env:
          NIXPKGS_ALLOW_UNFREE: 1
        run: |
          set -euo pipefail
          PACKAGES=("discord" "discord-ptb" "discord-canary" "discord-development")
          
          for pkg in "${PACKAGES[@]}"; do
            echo "::group::Updating ${pkg}"

            nix build ".#${pkg}.passthru.updateScript"
            script_path="./result/bin/${pkg}-update-script"
            
            if [[ ! -f "$script_path" ]]; then
              echo "::error::Update script for ${pkg} not found at $script_path"
              exit 1
            fi
            
            "$script_path"
            
            rm -rf ./result
            
            echo "::endgroup::"
          done
          echo "::notice::All variants have been updated."

      - name: Get new versions
        id: new-versions
        run: |
          set -euo pipefail
          echo "::group::Extracting new versions using nix eval"
          PACKAGES=("discord" "discord-ptb" "discord-canary" "discord-development")

          # Linux Versions
          for pkg in "${PACKAGES[@]}"; do
            version=$(nix eval --raw --impure ".#${pkg}.version")
            echo "linux_${pkg}=${version}" >> "$GITHUB_OUTPUT"
            echo "Extracted new Linux: ${pkg}=${version}"
          done

          # Darwin Versions
          for pkg in "${PACKAGES[@]}"; do
            version=$(nix eval --raw --system "aarch64-darwin" --impure ".#${pkg}.version")
            echo "darwin_${pkg}=${version}" >> "$GITHUB_OUTPUT"
            echo "Extracted new Darwin: ${pkg}=${version}"
          done
          echo "::endgroup::"

      - name: Test Linux Builds
        env:
          NIXPKGS_ALLOW_UNFREE: 1
        run: |
          set -euo pipefail
          echo "::group::Testing Linux builds with new versions"
          PACKAGES=("discord" "discord-ptb" "discord-canary" "discord-development")
          failed_packages=()
          for pkg in "${PACKAGES[@]}"; do
            echo "::notice::Testing build for ${pkg}"
            if ! nix build --no-link ".#${pkg}"; then
               echo "::error::Failed to build ${pkg}"
               failed_packages+=("$pkg")
            else
               echo "::notice::Successfully built ${pkg}"
            fi
          done
          if [[ ${#failed_packages[@]} -gt 0 ]]; then
            echo "::error::Failed to build packages: ${failed_packages[*]}"
            exit 1
          fi
          echo "::notice::All Linux builds tested successfully."
          echo "::endgroup::"

      - name: Commit changes
        if: success()
        env:
          OLD_linux_discord: ${{ steps.old-versions.outputs.linux_discord }}
          NEW_linux_discord: ${{ steps.new-versions.outputs.linux_discord }}
          
          OLD_linux_discord-ptb: ${{ steps.old-versions.outputs.linux_discord-ptb }}
          NEW_linux_discord-ptb: ${{ steps.new-versions.outputs.linux_discord-ptb }}
          
          OLD_linux_discord-canary: ${{ steps.old-versions.outputs.linux_discord-canary }}
          NEW_linux_discord-canary: ${{ steps.new-versions.outputs.linux_discord-canary }}
          
          OLD_linux_discord-development: ${{ steps.old-versions.outputs.linux_discord-development }}
          NEW_linux_discord-development: ${{ steps.new-versions.outputs.linux_discord-development }}
          
          OLD_darwin_discord: ${{ steps.old-versions.outputs.darwin_discord }}
          NEW_darwin_discord: ${{ steps.new-versions.outputs.darwin_discord }}
          
          OLD_darwin_discord-ptb: ${{ steps.old-versions.outputs.darwin_discord-ptb }}
          NEW_darwin_discord-ptb: ${{ steps.new-versions.outputs.darwin_discord-ptb }}
          
          OLD_darwin_discord-canary: ${{ steps.old-versions.outputs.darwin_discord-canary }}
          NEW_darwin_discord-canary: ${{ steps.new-versions.outputs.darwin_discord-canary }}
          
          OLD_darwin_discord-development: ${{ steps.old-versions.outputs.darwin_discord-development }}
          NEW_darwin_discord-development: ${{ steps.new-versions.outputs.darwin_discord-development }}
        run: |
          set -euo pipefail
          
          if ! git diff --quiet --exit-code pkgs/discord/default.nix; then
            echo "::notice::Changes detected in pkgs/discord/default.nix. Proceeding with commit."
          else
            echo "::notice::No changes detected. Nothing to commit."
            exit 0
          fi
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'

          commit_body=""
          
          add_change() {
            local list_name="$1"
            local branch_name="$2"
            local old_ver="$3"
            local new_ver="$4"
            if [[ "$old_ver" != "$new_ver" ]]; then
              eval "$list_name+=(\"$branch_name: $old_ver -> $new_ver\")"
            fi
          }
          
          linux_changes=()
          add_change linux_changes "stable" "$OLD_linux_discord" "$NEW_linux_discord"
          add_change linux_changes "ptb" "$OLD_linux_discord-ptb" "$NEW_linux_discord-ptb"
          add_change linux_changes "canary" "$OLD_linux_discord-canary" "$NEW_linux_discord-canary"
          add_change linux_changes "development" "$OLD_linux_discord-development" "$NEW_linux_discord-development"
          
          darwin_changes=()
          add_change darwin_changes "stable" "$OLD_darwin_discord" "$NEW_darwin_discord"
          add_change darwin_changes "ptb" "$OLD_darwin_discord-ptb" "$NEW_darwin_discord-ptb"
          add_change darwin_changes "canary" "$OLD_darwin_discord-canary" "$NEW_darwin_discord-canary"
          add_change darwin_changes "development" "$OLD_darwin_discord-development" "$NEW_darwin_discord-development"
          
          if [[ ${#linux_changes[@]} -gt 0 ]]; then
            commit_body+="- linux: $(IFS=, ; echo "${linux_changes[*]}")\n"
          fi
          if [[ ${#darwin_changes[@]} -gt 0 ]]; then
            commit_body+="- darwin: $(IFS=, ; echo "${darwin_changes[*]}")\n"
          fi
          
          COMMIT_MSG=$(printf "discord: update versions\n\n%b" "$commit_body")
          
          echo -e "Commit message:\n$COMMIT_MSG"
          
          git add pkgs/discord/default.nix
          git commit -m "$COMMIT_MSG"
          
          echo "::notice::Pushing changes with retry logic..."
          for attempt in {1..5}; do
            if git push; then
              echo "::notice::Successfully pushed changes on attempt $attempt."
              exit 0
            fi
            if [[ $attempt == 5 ]]; then
              echo "::error::Failed to push after 5 attempts."
              exit 1
            fi
            echo "::warning::Push attempt $attempt failed. Rebasing and retrying in $((attempt * 2))s..."
            git pull --rebase
            sleep $((attempt * 2))
          done
